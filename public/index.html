<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCB - PhotoQuiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;600;700;800;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#ff2d78",
                        secondary: "#00ffcc",
                        tertiary: "#ffe04a",
                        background: "#0a0a12",
                        surface: "#0f0f1a",
                        "surface-container": "#141422",
                        "surface-container-high": "#1e1e30",
                        "surface-container-highest": "#28283e",
                        "on-surface": "#e8e0f0",
                        "on-surface-variant": "#a098b0",
                        outline: "#5a5068",
                        "outline-variant": "#302840",
                        error: "#ff4444",
                        "error-container": "#3d0f0f",
                    },
                    fontFamily: {
                        headline: ["Sora", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                        label: ["Space Grotesk", "sans-serif"],
                    },
                },
            },
        };
    </script>
    <link href="assets/css/style.css" rel="stylesheet" />
    
</head>
<body>
   <body class="bg-background font-body text-on-surface selection:bg-primary selection:text-white overflow-x-hidden min-h-screen">
    <div class="fixed inset-0 scanline-overlay z-[60] pointer-events-none"></div>

    <!-- Top Navigation -->
    <nav class="fixed top-0 z-50 w-full h-16 px-6 flex justify-between items-center bg-[#0a0a12]/90 backdrop-blur-xl border-b border-pink-500/30 shadow-[0_4px_20px_rgba(0,0,0,0.8)]">
        <div class="text-2xl font-bold tracking-tighter text-pink-500 drop-shadow-[0_0_8px_rgba(255,45,120,0.8)] font-headline">
            MCB QUIZ
        </div>
        <div class="flex items-center gap-6">
            <span class="material-symbols-outlined text-slate-400 cursor-pointer transition-all duration-300 ease-in-out hover:text-cyan-400 hover:drop-shadow-[0_0_8px_rgba(0,255,204,0.6)] active:scale-95">settings</span>
        </div>
    </nav>

    <main class="pt-24 pb-32 px-4 max-w-4xl mx-auto">
        <!-- Celebration Header -->
        <section class="text-center mb-12">
            <div class="relative inline-block mb-6">
                <div class="absolute -inset-4 bg-primary/20 blur-3xl rounded-full"></div>
                <span class="material-symbols-outlined text-[120px] text-primary neon-glow-pink relative" style="font-variation-settings: 'FILL' 1">emoji_events</span>
            </div>
            <h1 class="font-headline font-extrabold text-4xl mb-2 tracking-tight" id="resultTitle">¿ADIVINA QUIÉN?</h1>
            <p class="font-label text-secondary text-sm uppercase tracking-widest neon-glow-cyan" id="resultMessage">Level up achieved!</p>
            
            <div class="mt-8 flex flex-col items-center">
                <div class="text-6xl font-headline font-bold text-on-surface">
                    <span id="finalScore">0</span><span class="text-primary text-2xl ml-2 neon-glow-pink">PTS</span>
                </div>
                <div class="h-1 w-48 bg-surface-container-highest mt-4 rounded-full overflow-hidden">
                    <div class="h-full bg-primary shadow-[0_0_12px_#ff2d78]" id="scoreBar" style="width: 0%"></div>
                </div>
                <p class="font-label text-[10px] mt-2 text-on-surface-variant uppercase tracking-tighter" id="scorePercent">0% accuracy</p>
            </div>
        </section>

        <!-- Stats Grid -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-12">
            <div class="surface-container p-6 rounded-xl neon-border-pink flex flex-col items-center justify-center text-center transition-all duration-300 hover:bg-surface-container-high group">
                <span class="material-symbols-outlined text-primary mb-3 group-hover:scale-110 transition-transform">check_circle</span>
                <span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Correct</span>
                <span class="font-headline text-3xl font-bold mt-1" id="correctAnswers">0/0</span>
            </div>
            <div class="surface-container p-6 rounded-xl neon-border-cyan flex flex-col items-center justify-center text-center transition-all duration-300 hover:bg-surface-container-high group">
                <span class="material-symbols-outlined text-secondary mb-3 group-hover:scale-110 transition-transform">timer</span>
                <span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Total Time</span>
                <span class="font-headline text-3xl font-bold mt-1" id="totalTime">0s</span>
            </div>
            <div class="surface-container p-6 rounded-xl border border-tertiary/30 shadow-[inset_0_0_12px_rgba(255,224,74,0.05)] flex flex-col items-center justify-center text-center transition-all duration-300 hover:bg-surface-container-high group">
                <span class="material-symbols-outlined text-tertiary mb-3 group-hover:scale-110 transition-transform">target</span>
                <span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Accuracy</span>
                <span class="font-headline text-3xl font-bold mt-1" id="accuracy">0%</span>
            </div>
        </section>

        <!-- DB Status -->
        <div id="dbStatus" class="hidden mb-8 p-4 rounded-xl text-center font-label text-sm"></div>

        <!-- Leaderboard -->
        <section class="mb-12">
            <div class="flex items-center justify-between mb-6 px-2">
                <h2 class="font-headline text-xl font-bold flex items-center gap-2">
                    <span class="material-symbols-outlined text-secondary">leaderboard</span>
                    Leaderboard
                </h2>
                <span class="font-label text-xs text-on-surface-variant uppercase tracking-widest">Resultados</span>
            </div>
            <div class="space-y-3" id="leaderboardList">
                <!-- Generated by JS -->
            </div>
        </section>

        <!-- Actions -->
        <section class="grid grid-cols-2 gap-4">
            <a href="/" class="relative group cursor-pointer overflow-hidden rounded-xl h-24 flex items-center justify-center border border-primary/40 hover:bg-primary/10 transition-all">
                <span class="font-headline font-bold text-primary flex items-center gap-2">
                    <span class="material-symbols-outlined">replay</span>
                    Jugar de Nuevo
                </span>
            </a>
            <a href="/" class="relative group cursor-pointer overflow-hidden rounded-xl h-24 flex items-center justify-center border border-secondary/40 hover:bg-secondary/10 transition-all">
                <span class="font-headline font-bold text-secondary flex items-center gap-2">
                    <span class="material-symbols-outlined">home</span>
                    Inicio
                </span>
            </a>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full z-50 pb-safe bg-[#0a0a12] border-t border-cyan-500/20 shadow-[0_-4px_24px_rgba(0,255,204,0.15)] md:hidden">
        <div class="flex justify-around items-center w-full h-20 px-4">
            <a class="flex flex-col items-center justify-center text-slate-500 opacity-60 hover:text-cyan-300 transition-all" href="/">
                <span class="material-symbols-outlined">videogame_asset</span>
                <span class="text-[10px] font-bold uppercase tracking-widest font-label mt-1">Jugar</span>
            </a>
            <a class="flex flex-col items-center justify-center text-pink-500 drop-shadow-[0_0_10px_rgba(255,45,120,0.7)] scale-110 transition-all" href="/results.html">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">leaderboard</span>
                <span class="text-[10px] font-bold uppercase tracking-widest font-label mt-1">Resultados</span>
            </a>
        </div>
    </nav>

    <script src="/assets/js/game.js"></script>
</body>
</html>
