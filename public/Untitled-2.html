<!DOCTYPE html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PHOTOQUIZ - Game Screen</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&amp;family=Inter:wght@400;500&amp;family=Space_Grotesk:wght@500;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#1e1e30",
              "on-surface-variant": "#a098b0",
              surface: "#0f0f1a",
              "on-primary-container": "#ffe0ec",
              primary: "#ff2d78",
              "inverse-on-surface": "#0a0a12",
              "on-secondary": "#001a1a",
              "on-tertiary-container": "#fff0c0",
              "on-tertiary-fixed": "#1a1000",
              "on-error": "#1a0000",
              "inverse-surface": "#e8e0f0",
              "surface-container-highest": "#28283e",
              "secondary-fixed-dim": "#00e6b8",
              "surface-container": "#141422",
              "primary-container": "#b3004e",
              error: "#ff4444",
              secondary: "#00ffcc",
              "surface-tint": "#ff2d78",
              "inverse-primary": "#8c0038",
              "outline-variant": "#302840",
              "surface-variant": "#1e1e30",
              "on-primary": "#1a0010",
              "surface-dim": "#0f0f1a",
              "on-tertiary": "#1a1000",
              "on-background": "#e8e0f0",
              "primary-fixed": "#ffe0ec",
              "on-primary-fixed": "#3d0020",
              outline: "#5a5068",
              "on-secondary-fixed": "#001a1a",
              "on-secondary-container": "#c0fff4",
              "on-tertiary-fixed-variant": "#665200",
              "surface-container-lowest": "#0a0a12",
              "secondary-container": "#004d3d",
              "on-surface": "#e8e0f0",
              "on-secondary-fixed-variant": "#004d4d",
              "primary-fixed-dim": "#ff80aa",
              "tertiary-fixed-dim": "#ffe04a",
              background: "#0a0a12",
              "surface-bright": "#1a1a2e",
              "error-container": "#3d0f0f",
              "tertiary-fixed": "#fff0c0",
              "tertiary-container": "#665200",
              "surface-container-low": "#111118",
              tertiary: "#ffe04a",
              "secondary-fixed": "#c0fff4",
              "on-primary-fixed-variant": "#8c0038",
              "on-error-container": "#ffa0a0",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            fontFamily: {
              headline: ["Sora"],
              display: ["Sora"],
              body: ["Inter"],
              label: ["Space Grotesk"],
            },
          },
        },
      };
    </script>
    <style>
      .neo-glow-pink {
        text-shadow: 0 0 8px #ff2d78;
      }
      .neo-glow-cyan {
        text-shadow: 0 0 8px #00ffcc;
      }
      .neo-border-pink {
        border: 1px solid rgba(255, 45, 120, 0.4);
        box-shadow: inset 0 0 12px rgba(255, 45, 120, 0.1);
      }
      .neo-border-cyan {
        border: 1px solid rgba(0, 255, 204, 0.3);
        box-shadow: inset 0 0 12px rgba(0, 255, 204, 0.1);
      }
      .scanline {
        background:
          linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
          linear-gradient(
            90deg,
            rgba(255, 0, 0, 0.06),
            rgba(0, 255, 0, 0.02),
            rgba(0, 0, 255, 0.06)
          );
        background-size:
          100% 4px,
          3px 100%;
        pointer-events: none;
      }
      .timer-gradient {
        background: linear-gradient(90deg, #ff2d78 0%, #00ffcc 100%);
        box-shadow: 0 0 15px rgba(255, 45, 120, 0.6);
      }
    </style>
  </head>
  <body
    class="bg-background text-on-surface font-body selection:bg-primary selection:text-on-primary overflow-hidden"
  >
    <div class="fixed inset-0 scanline z-50"></div>
    <!-- Top Navigation Shell (Shared Component: TopAppBar) -->
    <header
      class="bg-[#0a0a12]/90 backdrop-blur-xl border-b border-pink-500/30 shadow-[0_4px_20px_rgba(0,0,0,0.8)] flex justify-between items-center w-full px-6 h-16 fixed top-0 z-40"
    >
      <div
        class="text-2xl font-bold tracking-tighter text-pink-500 drop-shadow-[0_0_8px_rgba(255,45,120,0.8)] font-headline"
      >
        PHOTOQUIZ
      </div>
      <div class="flex items-center gap-4">
        <button
          class="transition-all duration-300 ease-in-out active:scale-95 text-slate-400 hover:text-cyan-400 hover:drop-shadow-[0_0_8px_rgba(0,255,204,0.6)]"
        >
          <span class="material-symbols-outlined" data-icon="notifications"
            >notifications</span
          >
        </button>
        <button
          class="transition-all duration-300 ease-in-out active:scale-95 text-slate-400 hover:text-cyan-400 hover:drop-shadow-[0_0_8px_rgba(0,255,204,0.6)]"
        >
          <span class="material-symbols-outlined" data-icon="settings"
            >settings</span
          >
        </button>
      </div>
    </header>
    <main
      class="pt-20 pb-24 min-h-screen px-4 md:px-8 max-w-4xl mx-auto flex flex-col gap-6"
    >
      <!-- Player Info & Stats Section -->
      <section class="flex flex-col gap-4">
        <div class="flex justify-between items-end">
          <div class="flex flex-col">
            <span
              class="font-label text-xs uppercase tracking-[0.2em] text-on-surface-variant"
              >Active Player</span
            >
            <h1
              class="font-headline font-bold text-xl text-secondary neo-glow-cyan"
            >
              CYBER_REBEL_88
            </h1>
          </div>
          <div class="flex flex-col items-end">
            <span
              class="font-label text-xs uppercase tracking-[0.2em] text-on-surface-variant"
              >Score</span
            >
            <div
              class="font-headline font-extrabold text-3xl text-primary neo-glow-pink"
            >
              12,450
            </div>
          </div>
        </div>
        <!-- Glowing Timer Bar -->
        <div
          class="w-full h-3 bg-surface-container-highest rounded-full overflow-hidden neo-border-cyan p-[1px]"
        >
          <div
            class="h-full timer-gradient rounded-full w-[65%]"
            style="transition: width 1s linear"
          ></div>
        </div>
        <div
          class="flex justify-between font-label text-[10px] text-on-surface-variant tracking-widest uppercase"
        >
          <span>Time Remaining</span>
          <span class="text-secondary">08.2s</span>
        </div>
      </section>
      <!-- Main Photo Container (Asymmetric / Cinematic) -->
      <section class="relative flex-grow min-h-[300px] md:min-h-[400px]">
        <div
          class="absolute inset-0 bg-surface-container rounded-xl overflow-hidden neo-border-pink"
        >
          <img
            alt="Neon city street at night"
            class="w-full h-full object-cover opacity-90 group-hover:scale-105 transition-transform duration-700"
            data-alt="Cinematic eye-level shot of a futuristic cyberpunk Tokyo street at night with glowing pink and cyan neon signs reflecting on wet asphalt"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuCjxUsIDZoNJ_jqutWv4BO836h4NpXcU3t19dFxkaWjiQ4N4OPXy0LxjTw3ekgJDdFzb1JKzOZAGsyE_Tdc3SNJK7nZ8FrfMkHP0XbbmWKZsu9SYTXMUSGcd-wXbJmXFHh1n6zBUCuxyJfzl_iCKWIXe13W-rgsuv_WGX9TB5Qrsc_8bnKLhWcOAaRlRnS8bVfZX319bHp8lXbwFdIHbWpQRRpQ-ugspahhQg1Wf7oBDNR8Cz8uMpT8zlWDzCNCf4z8-g7RRZtUqho"
          />
          <!-- Overlay Gradients -->
          <div
            class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent opacity-60"
          ></div>
          <div
            class="absolute bottom-4 left-4 bg-surface-container-lowest/80 backdrop-blur-md px-4 py-2 rounded-lg neo-border-cyan"
          >
            <span class="font-label text-xs font-bold text-cyan-400"
              >CATEGORY: URBAN_GEOMETRY</span
            >
          </div>
        </div>
      </section>
      <!-- Question Text -->
      <section class="text-center py-2">
        <h2
          class="font-headline text-lg md:text-2xl font-bold tracking-tight text-on-surface"
        >
          Identify the specific district shown in this hyper-saturated sector.
        </h2>
      </section>
      <!-- 2x2 Grid of Answer Buttons (Glassmorphism & Neon) -->
      <section class="grid grid-cols-2 gap-4">
        <button
          class="group relative overflow-hidden p-6 rounded-xl bg-surface-container-high/40 backdrop-blur-md border border-white/5 hover:border-primary/50 transition-all duration-300 active:scale-95 text-left"
        >
          <div
            class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity"
          ></div>
          <div class="flex flex-col gap-1 relative z-10">
            <span class="font-label text-[10px] text-primary/70 font-bold"
              >ALPHA</span
            >
            <span
              class="font-headline font-bold text-on-surface group-hover:text-primary transition-colors"
              >SHIBUYA_NORTH</span
            >
          </div>
        </button>
        <button
          class="group relative overflow-hidden p-6 rounded-xl bg-surface-container-high/40 backdrop-blur-md border border-white/5 hover:border-secondary/50 transition-all duration-300 active:scale-95 text-left"
        >
          <div
            class="absolute inset-0 bg-secondary/5 opacity-0 group-hover:opacity-100 transition-opacity"
          ></div>
          <div class="flex flex-col gap-1 relative z-10">
            <span class="font-label text-[10px] text-secondary/70 font-bold"
              >BETA</span
            >
            <span
              class="font-headline font-bold text-on-surface group-hover:text-secondary transition-colors"
              >AKIHABARA_CORE</span
            >
          </div>
        </button>
        <button
          class="group relative overflow-hidden p-6 rounded-xl bg-surface-container-high/40 backdrop-blur-md border border-white/5 hover:border-tertiary/50 transition-all duration-300 active:scale-95 text-left"
        >
          <div
            class="absolute inset-0 bg-tertiary/5 opacity-0 group-hover:opacity-100 transition-opacity"
          ></div>
          <div class="flex flex-col gap-1 relative z-10">
            <span class="font-label text-[10px] text-tertiary/70 font-bold"
              >GAMMA</span
            >
            <span
              class="font-headline font-bold text-on-surface group-hover:text-tertiary transition-colors"
              >SHINJUKU_VOID</span
            >
          </div>
        </button>
        <button
          class="group relative overflow-hidden p-6 rounded-xl bg-surface-container-high/40 backdrop-blur-md border border-white/5 hover:border-primary/50 transition-all duration-300 active:scale-95 text-left"
        >
          <div
            class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity"
          ></div>
          <div class="flex flex-col gap-1 relative z-10">
            <span class="font-label text-[10px] text-primary/70 font-bold"
              >DELTA</span
            >
            <span
              class="font-headline font-bold text-on-surface group-hover:text-primary transition-colors"
              >ROPPONGI_HILLS</span
            >
          </div>
        </button>
      </section>
    </main>
    <!-- Bottom Navigation Shell (Shared Component: BottomNavBar) -->
    <nav
      class="fixed bottom-0 w-full z-50 pb-safe bg-[#0a0a12] border-t border-cyan-500/20 shadow-[0_-4px_24px_rgba(0,255,204,0.15)] flex justify-around items-center h-20 px-4"
    >
      <a
        class="transition-transform duration-200 cubic-bezier(0.34,1.56,0.64,1) flex flex-col items-center justify-center text-pink-500 drop-shadow-[0_0_10px_rgba(255,45,120,0.7)] scale-110"
        href="#"
      >
        <span
          class="material-symbols-outlined"
          data-icon="videogame_asset"
          style="font-variation-settings: &quot;FILL&quot; 1"
          >videogame_asset</span
        >
        <span
          class="text-[10px] font-bold uppercase tracking-widest font-label mt-1"
          >Play</span
        >
      </a>
      <a
        class="transition-transform duration-200 cubic-bezier(0.34,1.56,0.64,1) flex flex-col items-center justify-center text-slate-500 opacity-60 hover:text-cyan-300 hover:opacity-100"
        href="#"
      >
        <span class="material-symbols-outlined" data-icon="leaderboard"
          >leaderboard</span
        >
        <span
          class="text-[10px] font-bold uppercase tracking-widest font-label mt-1"
          >Rankings</span
        >
      </a>
      <a
        class="transition-transform duration-200 cubic-bezier(0.34,1.56,0.64,1) flex flex-col items-center justify-center text-slate-500 opacity-60 hover:text-cyan-300 hover:opacity-100"
        href="#"
      >
        <span class="material-symbols-outlined" data-icon="person">person</span>
        <span
          class="text-[10px] font-bold uppercase tracking-widest font-label mt-1"
          >Profile</span
        >
      </a>
    </nav>
    <!-- Floating UI Decorations -->
    <div
      class="fixed top-1/4 -left-10 w-20 h-80 bg-primary/5 blur-3xl rounded-full rotate-45 pointer-events-none"
    ></div>
    <div
      class="fixed bottom-1/4 -right-10 w-32 h-60 bg-secondary/5 blur-3xl rounded-full -rotate-45 pointer-events-none"
    ></div>
  </body>
</html>
